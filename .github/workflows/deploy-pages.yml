name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      VITE_WS_URL: wss://api.loreandorder.com
      VITE_BASE_PATH: /
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            apps/server/package-lock.json
            apps/web/package-lock.json

      - name: Assert production websocket URL
        run: |
          if [ -z "$VITE_WS_URL" ]; then
            echo "VITE_WS_URL is required for GitHub Pages builds."
            exit 1
          fi
          echo "Using VITE_WS_URL=$VITE_WS_URL"

      - name: Assert production base path
        run: |
          if [ -z "$VITE_BASE_PATH" ]; then
            echo "VITE_BASE_PATH is required for GitHub Pages builds."
            exit 1
          fi
          echo "Using VITE_BASE_PATH=$VITE_BASE_PATH"

      - name: Install server dependencies for icon generation
        run: npm --prefix apps/server ci

      - name: Install Chromium for icon generation
        run: npx --prefix apps/server playwright install chromium

      - name: Generate icons from appicon.svg
        run: npm --prefix apps/web run icons:generate

      - name: Build web app
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
